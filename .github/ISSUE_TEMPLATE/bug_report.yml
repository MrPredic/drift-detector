name: Bug Report
description: Something is not working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I call measure_drift(), I get..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: The shortest code snippet that reproduces the issue.
      render: python
      placeholder: |
        from drift_detector import DriftDetectorAgent
        detector = DriftDetectorAgent()
        # ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: "I expected the drift score to be < 0.4"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Output of `pip show drift-detector` and `python --version`
      render: shell
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Logs, stack traces, anything else that might help.
