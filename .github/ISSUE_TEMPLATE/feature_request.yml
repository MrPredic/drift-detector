name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe what you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
      placeholder: "When monitoring a trading agent, I need..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried?

  - type: dropdown
    id: scope
    attributes:
      label: Which part of the project?
      options:
        - Core detection signals
        - LangChain integration
        - CrewAI integration
        - FastAPI dashboard / UI
        - Documentation / examples
        - Other
    validations:
      required: true
